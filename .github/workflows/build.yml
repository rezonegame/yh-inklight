name: Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Verify metadata and types
        run: npm run verify
      - name: Build
        run: npm run build
      - name: Confirm output exists
        run: node -e "if (!require('node:fs').existsSync('main.js')) process.exit(1)"
